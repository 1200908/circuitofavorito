<section class="page-background">
<section class="hero">
  <div class="hero-content">
    <h1>
      <span class="hero-welcome">Bem-vindo à</span>
      <span class="hero-brand">Circuito Favorito</span>
    </h1>
    <div class="hero-slider">

      <video #slides autoplay muted loop playsinline>
        <source src="assets/est.mp4" type="video/mp4">
      </video>
      <img src="assets/capa2.jpg" alt="Hero 1" #slides>
      <img src="assets/capa3.jpg" alt="Hero 1" #slides>
      <img src="assets/capa4.jpg" alt="Hero 1" #slides>
      <img src="assets/capa5.jpg" alt="Hero 1" #slides>

    </div>    <!--<video autoplay muted loop playsinline class="hero-video">
      <source src="assets/est.mp4" type="video/mp4">
    </video>-->
    <p>Projetos, inovação e soluções que fazem a diferença.</p>

  </div>

  <div class="scroll-hint">
    <div class="scroll-mouse"><div class="scroll-dot"></div></div>
    <span>Scroll</span>
  </div>

</section>
<section class="obras hidden" appScrollReveal>
  <h2>Projetos</h2>

  <div class="carousel-wrapper">
    <button
      class="arrow left"
      (click)="scrollLeft()"
      [hidden]="isAtStart()">
      <i class="fas fa-chevron-left"></i>
    </button>
    <div class="projects-container" #carousel (scroll)="onScroll()">
      <div
        class="projects-scroll"
      >
        <div
          class="project-card"
          *ngFor="let projeto of projetos; let i = index"
          [class.active]="i === currentIndex"
          [routerLink]="['/projetos', projeto.id]"
        >
          <img [src]="projeto.imagem" alt="{{ projeto.titulo }}" />
          <div class="content">
            <span class="status" [ngClass]="projeto.estado">
              {{ projeto.estado === 'concluida' ? '✔ Concluída' : '🔧 Obra em Curso' }}
            </span>
            <h3>{{ projeto.titulo }} - {{ projeto.subtitulo }}</h3>
            <div class="meta">
              <span>📍 {{ projeto.localizacao }}</span>
              <span>📅 {{ projeto.data }}</span>
            </div>
            <p class="description">{{ projeto.descricao }}</p>
          </div>
        </div>
      </div>
    </div>

    <button
      class="arrow right"
      (click)="scrollRight()"
      [hidden]="isAtEnd()">
      <i class="fas fa-chevron-right"></i>
    </button>

  </div>

  <div class="carousel-footer hidden" appScrollReveal>
    <button routerLink="/projetos" class="btn-primary">Ver todos os Projectos</button>
  </div>

</section>

  <app-cta class= "hidden" appScrollReveal> </app-cta>


</section>
